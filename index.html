<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>XPYCTUK — RUST Content</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0f0f0f;
      color: white;
      text-align: center;
      animation: fadeIn 1.2s ease-in;
      overflow-x: hidden;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .banner {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      filter: brightness(0.3); /* затемнено по умолчанию */
      transition: filter 1.5s ease;
      z-index: 0;
      position: relative;
    }

    body.loaded .banner {
      filter: brightness(1); /* станет светлым */
    }

    .logo {
      width: 140px;
      margin-top: -70px;
      border-radius: 50%;
      border: 4px solid white;
      background: black;
      box-shadow: 0 0 20px red;
      transition: transform 0.3s ease;
      position: relative;
      z-index: 10;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    h1 {
      margin-top: 10px;
      font-size: 2.4em;
      letter-spacing: 1.5px;
      text-shadow: 0 0 6px rgba(255,255,255,0.2);
    }

    h2 {
      font-size: 1.3em;
      color: #ff4c4c;
      margin-top: -5px;
    }

    h5 {
      color: #999;
      font-weight: normal;
      margin-top: -10px;
    }

    .buttons a {
      display: block;
      margin: 14px auto;
      padding: 15px 30px;
      width: 240px;
      border-radius: 12px;
      background: linear-gradient(145deg, #ff3c3c, #ff5e5e);
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 1em;
      box-shadow: 0 0 12px #ff3c3c88;
      transition: all 0.25s ease;
    }

    .buttons a:hover {
      background: #cc2f2f;
      box-shadow: 0 0 20px #ff3c3c;
      transform: scale(1.04);
    }

    .footer {
      margin-top: 50px;
      color: #555;
      font-size: 0.75em;
    }

    .lang-switcher {
      position: absolute;
      top: 12px;
      right: 12px;
      background-color: rgba(0, 0, 0, 0.7);
      padding: 6px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      z-index: 9999;
    }

    .lang-switcher select {
      margin-left: 5px;
      padding: 3px;
      background: white;
      color: black;
      border-radius: 4px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Переключатель языка -->
  <div class="lang-switcher">
    <span>🌐</span>
    <select id="lang-select">
      <option value="ru">RU</option>
      <option value="en">EN</option>
    </select>
  </div>

  <!-- Баннер и логотип -->
  <img src="TOP ТОПОВЫЙ 8к (оформ).jpg" alt="Rust Banner" class="banner" />
  <img src="V-1-2.png" alt="Logo" class="logo" />

  <!-- Тексты -->
  <h1 id="title">XPYCTUK</h1>
  <h2 id="subtitle">RUST</h2>
  <h5 id="subdesc">17 000 часов</h5>

  <!-- Кнопки -->
  <div class="buttons">
    <a id="yt" href="https://www.youtube.com/channel/UC2Fa5Q1RkChe0jSTt6e9j-Q?sub_confirmation=1" target="_blank" onclick="playSound()">🎬 YouTube</a>
    <a id="tg" href="https://t.me/+T7ZblSqZibA0Yjk6" target="_blank" onclick="playSound()">💬 Telegram</a>
    <a id="ds" href="https://discord.gg/t5ryTfJ7qR" target="_blank" onclick="playSound()">🧠 Discord</a>
  </div>

  <!-- Подвал -->
  <div class="footer">© 2025 | Made by XPYCTUK [ x-X-x ] v 0.22</div>

  <!-- Звук -->
  <audio id="click-sound" src="typing.mp3" preload="auto"></audio>

  <!-- Скрипт -->
  <script>
    const translations = {
      ru: {
        title: "XPYCTUK",
        subtitle: "RUST",
        subdesc: "17 000 часов",
        youtube: "YouTube",
        telegram: "Telegram",
        discord: "Discord"
      },
      en: {
        title: "XPYCTUK",
        subtitle: "RUST",
        subdesc: "17 000 Hours",
        youtube: "YouTube",
        telegram: "Telegram",
        discord: "Discord"
      }
    };

    const langSelect = document.getElementById('lang-select');

    function applyLanguage(lang) {
      localStorage.setItem('lang', lang);
      document.getElementById('title').innerText = translations[lang].title;
      document.getElementById('subtitle').innerText = translations[lang].subtitle;
      document.getElementById('subdesc').innerText = translations[lang].subdesc;
      document.getElementById('yt').innerHTML = `🎬 ${translations[lang].youtube}`;
      document.getElementById('tg').innerHTML = `💬 ${translations[lang].telegram}`;
      document.getElementById('ds').innerHTML = `🧠 ${translations[lang].discord}`;
    }

    langSelect.addEventListener('change', () => {
      applyLanguage(langSelect.value);
    });

    const savedLang = localStorage.getItem('lang') || 'ru';
    langSelect.value = savedLang;
    applyLanguage(savedLang);

    function playSound() {
      document.getElementById('click-sound').play();
    }

    // Плавное осветление баннера
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.body.classList.add("loaded");
      }, 1500);
    });
  </script>
</body>
</html>
