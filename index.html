<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HORNET — RUST Content</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #050505;
      color: white;
      text-align: center;
      animation: fadeIn 1.2s ease-in;
      overflow-x: hidden;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

.banner {
  width: 100%;
  height: 320px;
  object-fit: cover;
  object-position: center 35%;
  display: block;
  filter: brightness(0.75);
  transition: filter 1.5s ease;
  z-index: 0;
  position: relative;
}

    body.loaded .banner {
      filter: brightness(1);
    }

    .logo {
      width: 140px;
      margin-top: -60px;
      border-radius: 50%;
      border: 4px solid #ffffff;
      background: black;
      box-shadow: 0 0 24px #7CFF00;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      z-index: 10;
    }

    .logo:hover {
      transform: scale(1.05);
      box-shadow: 0 0 34px #7CFF00;
    }

    h1 {
      margin-top: 10px;
      font-size: 2.5em;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(124, 255, 0, 0.35);
    }

    h2 {
      font-size: 1.15em;
      color: #7CFF00;
      margin-top: -5px;
      letter-spacing: 1px;
    }

    h5 {
      color: #999;
      font-weight: normal;
      margin-top: -8px;
    }

    .buttons a {
      display: block;
      margin: 14px auto;
      padding: 15px 30px;
      width: 240px;
      border-radius: 12px;
      background: linear-gradient(145deg, #5fd600, #7CFF00);
      color: black;
      text-decoration: none;
      font-weight: bold;
      font-size: 1em;
      box-shadow: 0 0 14px #7CFF0088;
      transition: all 0.25s ease;
    }

    .buttons a:hover {
      background: #7CFF00;
      box-shadow: 0 0 24px #7CFF00;
      transform: scale(1.04);
    }

    .footer {
      margin-top: 50px;
      color: #555;
      font-size: 0.75em;
    }

    .lang-switcher {
      position: absolute;
      top: 12px;
      right: 12px;
      background-color: rgba(0, 0, 0, 0.75);
      padding: 6px 8px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      z-index: 9999;
      box-shadow: 0 0 10px rgba(124, 255, 0, 0.25);
    }

    .lang-switcher select {
      margin-left: 5px;
      padding: 3px;
      background: white;
      color: black;
      border-radius: 4px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    @media (max-width: 600px) {
  .banner {
    height: 220px;
    object-position: 50% 35%;
  }

  .logo {
    width: 140px;
    margin-top: -55px;
  }

  h1 {
    font-size: 2.2em;
  }

  h2 {
    font-size: 1em;
  }

  .buttons a {
    width: 75%;
    max-width: 280px;
  }
}
  </style>
</head>

<body>

  <div class="lang-switcher">
    <span>🌐</span>
    <select id="lang-select">
      <option value="ru">RU</option>
      <option value="en">EN</option>
    </select>
  </div>

  <img src="HORNETbanner.jpg" alt="HORNET Banner" class="banner" />
  <img src="HORNET logo.png" alt="HORNET Logo" class="logo" />

  <h1 id="title">HORNET</h1>
  <h2 id="subtitle">RUST CONTENT CREATOR</h2>
  <h5 id="subdesc">17 000+ часов в RUST</h5>

  <div class="buttons">
    <a id="yt" href="https://www.youtube.com/channel/UC2Fa5Q1RkChe0jSTt6e9j-Q?sub_confirmation=1" target="_blank" onclick="playSound()">🎬 YouTube</a>
    <a id="tg" href="https://t.me/+T7ZblSqZibA0Yjk6" target="_blank" onclick="playSound()">💬 Telegram</a>
    <a id="ds" href="https://discord.gg/t5ryTfJ7qR" target="_blank" onclick="playSound()">🧠 Discord</a>
  </div>

  <div class="footer">© 2026 | HORNET</div>

  <audio id="click-sound" src="typing.mp3" preload="auto"></audio>

  <script>
    const translations = {
      ru: {
        title: "HORNET",
        subtitle: " 17 000+ часов в Rust ",
        subdesc: "  ",
        youtube: "YouTube",
        telegram: "Telegram",
        discord: "Discord"
      },
      en: {
        title: "HORNET",
        subtitle: "17 000+ hours in Rust",
        subdesc: "  ",
        youtube: "YouTube",
        telegram: "Telegram",
        discord: "Discord"
      }
    };

    const langSelect = document.getElementById('lang-select');

    function applyLanguage(lang) {
      localStorage.setItem('lang', lang);
      document.getElementById('title').innerText = translations[lang].title;
      document.getElementById('subtitle').innerText = translations[lang].subtitle;
      document.getElementById('subdesc').innerText = translations[lang].subdesc;
      document.getElementById('yt').innerHTML = `🎬 ${translations[lang].youtube}`;
      document.getElementById('tg').innerHTML = `💬 ${translations[lang].telegram}`;
      document.getElementById('ds').innerHTML = `🧠 ${translations[lang].discord}`;
    }

    langSelect.addEventListener('change', () => {
      applyLanguage(langSelect.value);
    });

    const savedLang = localStorage.getItem('lang') || 'ru';
    langSelect.value = savedLang;
    applyLanguage(savedLang);

    function playSound() {
  const sound = document.getElementById('click-sound');
  sound.currentTime = 0;
  sound.play();
}

// Звук при наведении
document.querySelectorAll('a, button, select, .logo').forEach(element => {
    element.addEventListener('mouseenter', playSound);
});


window.addEventListener("load", () => {
  setTimeout(() => {
    document.body.classList.add("loaded");
  }, 1000);
});
  </script>

</body>
</html>
